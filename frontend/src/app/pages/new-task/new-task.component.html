<div class="centered-content">
    <div class="modal-box">
        <div class="title">
            Create New Task
        </div>
        <input #TaskTitleInput type="text" class="input has-background-light is-medium" placeholder="please enter Task name">
        <br><br>
        <div class="buttons is-right">
            <button class="button is-medium" routerLink="/">Cancel</button>
            <button class="button is-primary has-text-white is-medium" (click)='NewTask(TaskTitleInput.value)'>Create</button>

        </div>
    </div>
</div>
