<div class='centered-content'>
    <div class="task-manager-container">
        <div class="sidebar has-background-white">
            <h1 class="title has-text-primary">
                List
            </h1>
            <div class='list-menu'>
                <a class="list-menu-item" *ngFor='let list of lists' [routerLink]="['/lists',list._id]" routerLinkActive="is-active">
                    <p>{{list.title}}</p>
                </a>
            </div>

            <button class="button is-primary has-text-white" routerLink='/new-list'>+ New List</button>
        </div>

        <div class="task-list-container has-background-light">
            <div *ngIf="tasks">
                <h1 class="title has-text-primary">
                    Tasks
                </h1>
    
                <div class='task' *ngFor='let task of tasks' (click)='onTaskClicked(task)' [ngClass]="{'complete':task.Complete}">
                    <p>{{task.title}}</p>
                </div>

                <h3 class="title is-4" *ngIf="tasks.length === 0">There are no Task here </h3>
                <button routerLink='./tasks' class='circle-add-button button is-primary'>
                    <img src="../../../assets/plus-icon.svg" alt="">
                </button>
            </div>
            <div *ngIf="!tasks">
                <h3 class="title is-4">Please Select List in Sidebar</h3>
            </div>
        </div>
    </div>
</div>
